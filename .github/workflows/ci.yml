name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-checks:
    name: local-checks / Python 3.12
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project and dev dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run local checks
        run: ./scripts/check.sh

      - name: Run installed package smoke checks
        run: |
          agent-rules-kit --version
          agent-rules-kit check tests/fixtures/repositories/single-agent --format json | python -m json.tool
          agent-rules-kit doctor tests/fixtures/repositories/single-agent
          agent-rules-kit budget tests/fixtures/repositories/single-agent
          agent-rules-kit explain AIRK-GOV003
          agent-rules-kit explain --list

  compatibility-checks:
    name: compatibility / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and dev dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run local checks
        run: ./scripts/check.sh
